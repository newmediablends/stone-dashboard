<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stone">
  <title>Stone</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="shortcut icon" href="icon.svg">
  <meta name="theme-color" content="#0C2818">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ---- LIGHT THEME ---- */
    :root, [data-theme="light"] {
      --bg:           #FFFFFF;
      --bg-surface:   #F9FAFB;
      --bg-card:      #FFFFFF;
      --border:       #E5E7EB;
      --border-light: #F3F4F6;
      --text:         #111827;
      --text-2:       #374151;
      --text-3:       #4B5563;
      --text-4:       #6B7280;
      --green:        #1A4731;
      --green-btn:    #1A4731;
      --mint-bg:      #D1FAE5;
      --mint-text:    #1A4731;
      --amber:        #D97706;
      --amber-bg:     #FEF3C7;
      --amber-text:   #D97706;
      --red:          #DC2626;
      --red-bg:       #FEE2E2;
      --red-text:     #DC2626;
      --purple-bg:    #EDE9FE;
      --purple-text:  #7C3AED;
      --dark-card:    #111827;
      --dark-card-2:  #1F2937;
      --dark-text:    #FFFFFF;
      --dark-text-2:  #6B7280;
      --dark-text-3:  #9CA3AF;
      --progress-bg:  rgba(217,119,6,0.2);
      --mic-border:   #E5E7EB;
    }

    /* ---- DARK THEME ---- */
    [data-theme="dark"] {
      --bg:           #0F172A;
      --bg-surface:   #1E293B;
      --bg-card:      #1E293B;
      --border:       #334155;
      --border-light: #1E293B;
      --text:         #F1F5F9;
      --text-2:       #CBD5E1;
      --text-3:       #B0C4D6;
      --text-4:       #94A3B8;
      --green:        #1A4731;
      --green-btn:    #166534;
      --mint-bg:      #022C22;
      --mint-text:    #6EE7B7;
      --amber:        #D97706;
      --amber-bg:     #451A03;
      --amber-text:   #FCD34D;
      --red:          #DC2626;
      --red-bg:       #450A0A;
      --red-text:     #FCA5A5;
      --purple-bg:    #2E1065;
      --purple-text:  #C4B5FD;
      --dark-card:    #1E293B;
      --dark-card-2:  #273447;
      --dark-text:    #F1F5F9;
      --dark-text-2:  #64748B;
      --dark-text-3:  #94A3B8;
      --progress-bg:  rgba(217,119,6,0.15);
      --mic-border:   #334155;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', system-ui, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; transition: background 0.2s, color 0.2s; }
    @media (min-width: 500px) { body { background: var(--bg-surface); } }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 430px; margin: 0 auto; position: relative; }
    @media (min-width: 500px) { #app { box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.18); border-radius: 24px; overflow: hidden; height: calc(100% - 32px); margin-top: 16px; } }

    .status-bar { height: env(safe-area-inset-top, 44px); min-height: 20px; flex-shrink: 0; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 24px 12px; flex-shrink: 0; }
    .wordmark { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    .theme-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-surface); cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }

    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-btn); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .tab-bar { display: flex; align-items: center; gap: 8px; padding: 0 24px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-pill { background: var(--bg-surface); color: var(--text-3); font-size: 14px; font-weight: 500; padding: 8px 18px; border-radius: 999px; border: none; cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
    .tab-pill.active { background: var(--text); color: var(--bg); font-weight: 600; }

    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(88px + env(safe-area-inset-bottom, 20px)); }

    .mic-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 24px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 20px)); background: var(--bg); border-top: 1px solid var(--border-light); }
    .mic-inner { display: flex; align-items: center; gap: 12px; background: var(--bg-surface); border: 1px solid var(--mic-border); border-radius: 14px; padding: 14px 16px; }
    .mic-text { flex: 1; font-size: 16px; color: var(--text); border: none; background: transparent; outline: none; font-family: inherit; transition: color 0.1s; }
    .mic-text::placeholder { color: var(--text-4); }
    .mic-text.interim { color: var(--text-2); font-style: italic; }
    .mic-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--green-btn); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
    .mic-btn.listening { background: var(--red); animation: mic-pulse 1.4s ease infinite; }
    @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.45); } 60% { box-shadow: 0 0 0 7px rgba(239,68,68,0); } }

    /* ---- CONNECT SCREEN ---- */
    .connect-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px; text-align: center; gap: 24px; flex: 1; }
    .connect-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--mint-bg); display: flex; align-items: center; justify-content: center; }
    .connect-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 24px; color: var(--text); }
    .connect-sub { font-size: 14px; color: var(--text-3); line-height: 22px; max-width: 280px; }
    .connect-btn { background: var(--green-btn); color: white; font-size: 15px; font-weight: 600; padding: 14px 28px; border-radius: 999px; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .connect-note { font-size: 12px; color: var(--text-4); }

    /* ---- SHARED COMPONENTS ---- */
    .section-label { font-size: 13px; font-weight: 700; color: var(--text-3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px; }

    .mode-badge { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .mode-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mode-label { font-size: 13px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
    .mode-headline { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; color: var(--text); line-height: 34px; }

    /* ---- MODE PICKER ---- */
    .mode-badge-btn { display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px 7px 12px; border-radius: 999px; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; margin-bottom: 12px; position: relative; }
    .mode-picker-wrap { position: relative; display: inline-block; }
    .mode-picker-panel { position: absolute; top: calc(100% + 6px); left: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,0.14); z-index: 200; min-width: 230px; }
    .mode-picker-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
    .mode-picker-row:active { background: var(--bg-surface); }
    .mode-picker-row.is-live { background: var(--mint-bg); }
    .mode-picker-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mode-picker-label { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; flex: 1; }
    .mode-live-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--mint-text); color: #fff; padding: 2px 8px; border-radius: 999px; flex-shrink: 0; }
    .mode-check { flex-shrink: 0; }

    /* ---- BACK TO LIVE ---- */
    .back-to-live { background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--amber-text); padding: 4px 0 10px; }

    .badge { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .bg-green   { background: var(--mint-bg);    color: var(--mint-text);   }
    .bg-amber   { background: var(--amber-bg);   color: var(--amber-text);  }
    .bg-red     { background: var(--red-bg);     color: var(--red-text);    }
    .bg-gray    { background: var(--bg-surface); color: var(--text-3);      }
    .bg-dark    { background: var(--text);       color: var(--bg);          }
    .bg-purple  { background: var(--purple-bg);  color: var(--purple-text); }

    .contact-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; }
    .avatar-sm      { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; }
    .av-green { background: var(--mint-bg); color: var(--mint-text); }
    .av-red   { background: var(--red-bg);  color: var(--red-text);  }
    .av-gray  { background: var(--bg-surface); color: var(--text-2); }

    .mask-grid { display: flex; gap: 8px; padding: 0 24px 20px; }
    .mask-card { flex: 1; background: var(--bg-surface); border-radius: 10px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .mask-letter { font-size: 16px; font-weight: 800; color: var(--text); }
    .mask-dot { width: 6px; height: 6px; border-radius: 50%; }
    .mask-sub { font-size: 12px; font-weight: 600; color: var(--text-4); text-align: center; text-transform: uppercase; letter-spacing: 0.04em; }

    .intention-card { margin: 0 24px 20px; background: var(--mint-bg); border-radius: 12px; padding: 16px 18px; }
    .intention-label { font-size: 11px; font-weight: 700; color: var(--mint-text); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .intention-text { font-family: 'DM Serif Display', Georgia, serif; font-style: italic; font-size: 15px; color: var(--mint-text); line-height: 22px; }

    .fitness-strip { display: flex; align-items: center; gap: 10px; margin: 0 24px 20px; padding: 12px 14px; background: var(--bg-surface); border-radius: 10px; border: 1px solid var(--border); }

    .next-up-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-light); gap: 10px; }
    .next-up-item:last-child { border-bottom: none; }

    .focus-block { margin: 0 24px 20px; background: var(--dark-card); border-radius: 16px; padding: 24px; }
    .countdown { font-family: 'DM Serif Display', Georgia, serif; font-size: 48px; color: var(--dark-text); line-height: 1; margin-bottom: 4px; }
    .countdown-label { font-size: 13px; color: var(--dark-text-3); margin-bottom: 20px; }
    .focus-priority { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 14px 16px; }
    .fp-label { font-size: 12px; font-weight: 700; color: var(--dark-text-3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
    .fp-text { font-size: 16px; font-weight: 600; color: var(--dark-text); }

    .progress-card { margin: 0 24px 20px; background: var(--amber-bg); border-radius: 12px; padding: 16px 18px; }
    .progress-track { background: var(--progress-bg); border-radius: 999px; height: 6px; margin: 10px 0 8px; }
    .progress-fill { background: var(--amber); border-radius: 999px; height: 6px; }

    .day-score-card { margin: 0 24px 20px; background: var(--dark-card); border-radius: 16px; padding: 20px 24px; }
    .day-score-num { font-family: 'DM Serif Display', Georgia, serif; font-size: 56px; color: var(--dark-text); line-height: 1; }

    .reflection-card { background: var(--bg-surface); border-radius: 10px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .refl-label { font-size: 13px; font-weight: 700; flex-shrink: 0; padding-top: 1px; width: 30px; }
    .refl-text { font-size: 14px; color: var(--text-2); line-height: 20px; }

    .wrap-cta { display: flex; align-items: center; justify-content: space-between; background: var(--dark-card); border-radius: 14px; padding: 18px 24px; cursor: pointer; }
    .wrap-cta-title { font-size: 15px; font-weight: 700; color: var(--dark-text); margin-bottom: 2px; }
    .wrap-cta-sub { font-size: 13px; color: var(--dark-text-2); }
    .wrap-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--green-btn); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .schedule-row { display: flex; align-items: stretch; min-height: 44px; }
    .sched-time { width: 72px; flex-shrink: 0; font-size: 14px; color: var(--text-4); padding-top: 3px; }
    .sched-time.now { color: var(--mint-text); font-weight: 600; }
    .sched-bar { width: 3px; background: var(--border); border-radius: 999px; flex-shrink: 0; margin-right: 14px; }
    .sched-bar.done { background: var(--mint-bg); }
    .sched-bar.now  { background: var(--green-btn); }
    .sched-content { flex: 1; padding: 2px 0 14px; }
    .sched-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.3; }
    .sched-title.dim { color: var(--text-2); }
    .sched-sub { font-size: 14px; color: var(--text-3); margin-top: 2px; }
    .sched-sub.dim { color: var(--text-4); }
    .sched-energy { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
    .sched-energy svg { flex-shrink: 0; }
    .sched-energy span { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
    .now-badge { background: var(--mint-bg); color: var(--mint-text); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px; letter-spacing: 0.04em; }

    .tenx-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .tenx-row:active { opacity: 0.65; }
    .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .checkbox.pri  { border-color: var(--green-btn); }
    .checkbox.done { background: var(--green-btn); border-color: var(--green-btn); }
    .tenx-label { flex: 1; font-size: 15px; color: var(--text); }
    .tenx-label.done { color: var(--text-4); text-decoration: line-through; }

    .contact-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
    .contact-row:last-child { border-bottom: none; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .contact-role { font-size: 14px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; }
    .contact-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .contact-time { font-size: 13px; color: var(--text-4); }

    .msg-preview { background: var(--bg-surface); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text-2); line-height: 18px; margin-top: 8px; }
    .msg-preview.drafting { color: var(--text-4); font-style: italic; }
    .send-btn { background: var(--green-btn); color: white; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 999px; border: none; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .send-btn.draft { background: var(--bg-surface); color: var(--text-3); }

    .project-card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; background: var(--bg-card); }
    .proj-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .proj-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .proj-sub  { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .proj-next { font-size: 14px; color: var(--text-2); }
    .proj-next-label { font-weight: 600; color: var(--text-4); }
    .proj-next-label.blocked { color: var(--red-text); }
    .pri-h { background: var(--text); color: var(--bg); }
    .pri-m { background: var(--bg-surface); color: var(--text-2); }
    .pri-l { background: var(--bg-surface); color: var(--text-4); }

    .log-entry { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .log-time { font-size: 14px; color: var(--text-4); flex-shrink: 0; padding-top: 1px; width: 42px; }
    .log-text { font-size: 15px; color: var(--text-2); line-height: 22px; }

    .faith-anchor { font-family: 'DM Serif Display', Georgia, serif; font-style: italic; font-size: 16px; color: var(--mint-text); line-height: 24px; padding: 0 24px 20px; border-bottom: 1px solid var(--border-light); }

    .section { padding: 20px 24px; }
    .section + .section { border-top: 1px solid var(--border-light); }

    .tmrw-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .tmrw-num  { font-size: 13px; font-weight: 700; color: var(--text-4); width: 16px; flex-shrink: 0; }
    .tmrw-text { font-size: 14px; color: var(--text); }

    .connected-note { font-size: 12px; color: var(--text-4); padding: 4px 24px 0; flex-shrink: 0; }

    .no-plan-banner { display:none; margin:8px 16px 0; padding:10px 14px; background:var(--amber-bg); border-radius:10px; border-left:3px solid var(--amber); }
    .no-plan-banner span { font-size:13px; color:var(--amber-text); font-weight:500; }

    /* Quick Hits */
    .quick-hit { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; }
    .qh-dot { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; margin-top:6px; }
    .qh-text { font-size:15px; color:var(--text-2); line-height:22px; flex:1; }
    .stone-tag { font-size:11px; font-weight:700; background:var(--mint-bg); color:var(--mint-text); padding:2px 7px; border-radius:4px; margin-right:6px; vertical-align:middle; }
    .quick-hit.stone-item .qh-dot { background:var(--mint-text); opacity:0.4; }

    /* MASK Journal — Day tab */
    .mask-journal-card { display:flex; gap:14px; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border-light); }
    .mask-journal-card:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .mask-journal-letter { width:28px; height:28px; border-radius:8px; background:var(--mint-bg); color:var(--mint-text); font-size:14px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .mask-journal-label { font-size:12px; font-weight:700; color:var(--text-4); text-transform:uppercase; letter-spacing:.05em; }
    .mask-journal-prompt { font-size:14px; color:var(--text-3); line-height:20px; margin-bottom:6px; }
    .mask-journal-response { font-size:15px; color:var(--text); line-height:22px; font-style:italic; border-left:2px solid var(--mint-text); padding-left:10px; }
    .mask-journal-pending { font-size:13px; color:var(--text-4); font-style:italic; }
    .mask-journal-card.tappable { cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0.04); transition: opacity 0.1s; }
    .mask-journal-card.tappable:active { opacity: 0.6; }
    .mask-journal-textarea { width:100%; font-size:15px; color:var(--text); background:var(--bg-card); border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; font-family:inherit; line-height:22px; resize:none; min-height:80px; outline:none; margin-top:6px; -webkit-appearance:none; }
    .mask-journal-textarea:focus { border-color:var(--mint-text); }
    .mask-save-btn { background:var(--green-btn); color:#fff; font-size:13px; font-weight:700; padding:9px 18px; border-radius:999px; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .mask-cancel-btn { background:var(--bg-surface); color:var(--text-3); font-size:13px; font-weight:600; padding:9px 16px; border-radius:999px; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; }

    .date-nav { display:flex; align-items:center; justify-content:center; gap:12px; padding:8px 24px 2px; flex-shrink:0; }

/* ---- FILE PARSERS ---- */
function section(md, ...headings) {
  // headings are treated as regex patterns (no escaping)
  for (const h of headings) {
    const re = new RegExp(`##\\s+${h}[\\s\\S]+?(?=\\n##|$)`);
    const m = md.match(re);
    if (m) return m[0];
  }
  return '';
}

function parseDailyNote(md) {
  const out = {};

  // Faith anchor — labeled format OR bare blockquote at top of doc
  const labeled = md.match(/\*\*Faith anchor:\*\*[\s\S]*?>\s*"?([^"\n]+)"?/);
  const bare    = md.match(/^>\s*"?([^"\n]+)"?\s*—/m);
  const raw     = labeled || bare;
  if (raw) out.faithAnchor = '"' + raw[1].trim().replace(/^"|"$/g,'') + '"';

  // Schedule — handles ## Section 1 or ## Schedule
  const sec1 = section(md, 'Section 1[^#\n]*', 'Schedule');
  const schedRows = [...sec1.matchAll(/\|\s*([^|\n\-]{2,}?)\s*\|\s*([^|\n\-]{2,}?)\s*\|\s*([^|\n\-]{2,}?)\s*\|/g)].slice(2);
  if (schedRows.length) {
    out.schedule = schedRows.map(r => ({
      time:  r[1].trim(),
      label: r[2].trim(),
      sub:   r[3].trim(),
      status: 'upcoming',
    }));
  }

  // 10x Items — handles ## Section 2 or ## 10x Items
  const sec2 = section(md, 'Section 2[^#\n]*', '10x Items');
  // Match rows starting with a number or ⚠️, with at least 3 pipe-separated cells
  const tenxRows = [...sec2.matchAll(/\|\s*(?:\d+|⚠️)[^\|]*\|\s*([^|\n]+?)\s*\|\s*([^|\n]+?)\s*\|[^|\n]*\|[^|\n]*\|\s*(\[[ x]\]|✅|)?\s*\|?/gi)]
    .filter(r => r[1] && !r[1].includes('---') && !r[1].toLowerCase().includes('item'));
  if (tenxRows.length) {
    out.tenX = tenxRows.map((r, i) => ({
      label: r[1].trim(),
      type:  r[2].trim().split(/[\/,]/)[0].trim().substring(0, 4),
      done:  /x|✅/i.test(r[3] || ''),
      pri:   false,
    }));
    const firstOpen = out.tenX.find(t => !t.done);
    if (firstOpen) firstOpen.pri = true;
  }

  // Quick Hits — handles **Quick Hits** bold or ## Quick Hits heading
  const qhSection = section(md, 'Quick Hits');
  const qhBold    = md.match(/\*\*Quick Hits\*\*\s*\n((?:\n?-[^\n]+)+)/);
  const qhSrc     = qhSection || (qhBold ? qhBold[0] : '');
  if (qhSrc) {
    const lines = [...qhSrc.matchAll(/^-\s+(.+)$/gm)];
    if (lines.length) {
      out.quickHits = lines.map(l => {
        const text = l[1].trim();
        return { label: text.replace(/^\(Stone\)\s*/, ''), stone: text.startsWith('(Stone)'), done: false };
      });
    }
  }

  // MASK Journal
  const maskSec = section(md, 'MASK Journal[^#\n]*');
  if (maskSec) {
    const labels = { M:'Mindset', A:'Action', S:'Spirituality', K:'Kindness' };
    out.maskJournal = ['M','A','S','K'].map(l => {
      const promptRe = new RegExp(`\\*\\*${l}:\\*\\*\\s*([^\n]+)`);
      const pm = maskSec.match(promptRe);
      const prompt = pm ? pm[1].trim() : '';
      let response = '';
      if (pm) {
        const after = maskSec.slice(maskSec.indexOf(pm[0]) + pm[0].length);
        const rm = after.match(/^\s*\n+>\s*(.+)/);
        if (rm) response = rm[1].trim().replace(/^"|"$/g,'');
      }
      return { letter:l, label:labels[l], prompt, response };
    }).filter(m => m.prompt);
  }

  // Network Top 5 — from daily note table
  const netSec = section(md, 'Network[^#\n]*Top 5', 'Network — Top 5', 'Network Top 5', 'Network');
  const netRows = [...netSec.matchAll(/\|\s*([^|\-\n]{3,40}?)\s*\|\s*([^|\n]+?)\s*\|\s*([^|\n]+?)\s*\|\s*([^|\n]*?)\s*\|/g)]
    .slice(2)
    .filter(r => r[1] && !r[1].includes('---') && !r[1].toLowerCase().includes('contact'));
  if (netRows.length) {
    out.contacts = netRows.map(r => {
      const name   = r[1].trim();
      const status = r[2].trim().toLowerCase();
      const action = r[3].trim();
      const due    = r[4]?.trim() || '';
      const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      const isOverdue = /overdue|now/i.test(status + due);
      const av     = isOverdue ? 'av-red' : /priority/i.test(status) ? 'av-green' : 'av-gray';
      const badge  = isOverdue ? 'overdue' : /priority/i.test(status) ? 'send' : 'active';
      return { initials, name, role: r[2].trim(), action, status: badge, time: due, av };
    });
    out.outreach = out.contacts.map(c => ({
      ...c, msg: '', status: c.status === 'overdue' ? 'send' : c.status
    }));
  }

  // Log — handles ## Section 3 or ## Log
  const logSec = section(md, 'Section 3[^#\n]*', 'Log');
  const allLogLines = [...logSec.matchAll(/^-\s+(.+)$/gm)]
    .filter(m => !/^---|^>|^#/.test(m[1].trim()));
  if (allLogLines.length) {
    out.log = allLogLines.map(m => {
      const line = m[1];
      const ts = line.match(/^(\d{1,2}:\d{2})\s*[-–]\s*(.+)/);
      if (ts) return { time: ts[1], entry: ts[2].trim() };
      return { time: '—', entry: line.trim() };
    });
  }

  return out;
}

function parseNetworkTracker(md) {
  const today = new Date(); today.setHours(0,0,0,0);
  const results = [];
  let hdr = null;

  for (const line of md.split('\n')) {
    if (!line.includes('|')) continue;
    const parts = line.split('|');
    const cells = parts.slice(1, parts.length - 1).map(c => c.trim());
    if (!cells.length) continue;
    if (cells.every(c => /^-*$/.test(c))) continue;

    const lower = cells.map(c => c.toLowerCase());
    if (lower[0] === 'name' && lower.some(c => c === 'status')) {
      hdr = {
        name:    0,
        company: lower.indexOf('company'),
        status:  lower.indexOf('status'),
        action:  lower.findIndex(c => c.includes('next action')),
        due:     lower.indexOf('due'),
      };
      continue;
    }

    if (!hdr) continue;
    const name = cells[hdr.name] || '';
    if (!name || /^[-–—]+$/.test(name)) continue;
    if (hdr.status >= 0 && cells.length <= hdr.status) continue;

    const company   = hdr.company >= 0 ? cells[hdr.company] || '' : '';
    const rawStatus = hdr.status  >= 0 ? cells[hdr.status]  || '' : '';
    const action    = hdr.action  >= 0 && hdr.action  < cells.length ? cells[hdr.action]  || '' : '';
    const due       = hdr.due     >= 0 && hdr.due     < cells.length ? cells[hdr.due]     || '' : '';

    const initials = name.split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
    const sl = rawStatus.toLowerCase();
    const dm = due.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    const dueDate = dm ? new Date(+dm[3], +dm[1]-1, +dm[2]) : null;
    const isPastDue = dueDate && dueDate < today;

    let status, av;
    if (isPastDue)                 { status = 'overdue'; av = 'av-red';   }
    else if (sl.includes('priority')) { status = 'send';    av = 'av-green'; }
    else                           { status = 'active';  av = 'av-gray';  }

    results.push({ initials, name, role: company, action, status, time: due, av });
  }

  results.sort((a,b) => ({overdue:0,send:1,active:2}[a.status]||2) - ({overdue:0,send:1,active:2}[b.status]||2));
  return results.length ? results.slice(0,8) : null;
}

async function scanProjects(dir) {
  const projects = [];
  try {
    for await (const [name, handle] of dir.entries()) {
      if (handle.kind !== 'directory') continue;
      const proj = { name, sub:'', status:'active', pri:'M', next:'—', blocked:false };
      try {
        const statusFile = await handle.getFileHandle('Status.md');
        const text = await (await statusFile.getFile()).text();
        const statusMatch = text.match(/\*\*Status[^:]*:\*\*\s*([^\n]+)/i);
        const nextMatch   = text.match(/\*\*Next[^:]*:\*\*\s*([^\n]+)/i);
        const priMatch    = text.match(/\*\*Priority[^:]*:\*\*\s*([HML])/i);
        if (statusMatch) {
          const s = statusMatch[1].toLowerCase();
          proj.status = s.includes('block') ? 'blocked' : s.includes('slow') ? 'slow' : 'active';
          proj.blocked = proj.status === 'blocked';
        }
        if (nextMatch)   proj.next = nextMatch[1].trim();
        if (priMatch)    proj.pri  = priMatch[1].toUpperCase();
      } catch {}
      projects.push(proj);
    }
  } catch {}
  return projects.slice(0,8);
}

/* ---- LOAD REAL DATA ---- */
async function loadRealData(dir, dateStr) {
  try {
    const dailyDir = await dir.getDirectoryHandle('Daily').catch(()=>null);
    if (dailyDir) {
      const brief = await dailyDir.getFileHandle('Tomorrow-Brief.md').catch(()=>null);
      if (brief) {
        const txt = await (await brief.getFile()).text();
        const anchor = txt.match(/\*\*Faith anchor:\*\*\s*([^\n]+)/);
        if (anchor) data.faithAnchor = anchor[1].trim();
      }
      const note = await dailyDir.getFileHandle(`${dateStr}.md`).catch(()=>null);
      if (note) {
        const txt = await (await note.getFile()).text();
        const parsed = parseDailyNote(txt);
        if (parsed.faithAnchor) data.faithAnchor = parsed.faithAnchor;
        if (parsed.schedule)    data.schedule    = parsed.schedule;
        if (parsed.tenX)        data.tenX        = parsed.tenX;
        if (parsed.log)         data.log         = parsed.log;
        if (parsed.contacts)    data.contacts    = parsed.contacts;
        if (parsed.outreach)    data.outreach    = parsed.outreach;
        if (parsed.maskJournal) data.maskJournal = parsed.maskJournal;
        if (parsed.quickHits)   data.quickHits   = parsed.quickHits;
      }
    }
  } catch (e) { console.warn('Daily note:', e); }

  try {
    const resDir = await dir.getDirectoryHandle('3-Resources').catch(()=>null);
    if (resDir) {
      const tracker = await resDir.getFileHandle('Network-Tracker.md').catch(()=>null);
      if (tracker) {
        const txt = await (await tracker.getFile()).text();
        const contacts = parseNetworkTracker(txt);
        if (contacts && contacts.length) {
          data.contacts = contacts;
          data.outreach = contacts.map(c => ({...c, msg:''}));
        }
      }
    }
  } catch (e) { console.warn('Network Tracker:', e); }

  try {
    const projDir = await dir.getDirectoryHandle('1-Projects').catch(()=>null);
    if (projDir) {
      const projects = await scanProjects(projDir);
      if (projects.length) data.projects = projects;
    }
  } catch (e) { console.warn('Projects:', e); }

  return dateStr;
}

  if (t>=5  && t<9)    return 'prime';
  if (t>=9  && t<11)   return 'peak';
  if (t>=11.5 && t<14) return 'rebuild';
  if (t>=14 && t<18)   return 'execute';
  return 'wrap';
}

function modeHero(m) {
  const c = modeCfg[m];
  const live = getMode();
  const isLive = m === live && !manualMode;
  const chevronPath = pickerOpen
    ? 'M18 15l-6-6-6 6'
    : 'M6 9l6 6 6-6';
  const chevron = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="${chevronPath}" stroke="${c.fg}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const rows = Object.entries(modeCfg).map(([key, cfg]) => {
    const isThisLive = key === live;
    const isSelected = key === m;
    return `<div class="mode-picker-row${isThisLive ? ' is-live' : ''}" onclick="selectMode('${key}')">
      <div class="mode-picker-dot" style="background:${cfg.dot}"></div>
      <span class="mode-picker-label" style="color:${cfg.color}">${cfg.label}</span>
      ${isThisLive ? `<span class="mode-live-tag">LIVE</span>` : ''}
      ${isSelected && !isThisLive ? `<svg class="mode-check" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="var(--mint-text)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
    </div>`;
  }).join('');

  const panel = pickerOpen
    ? `<div class="mode-picker-panel" id="mode-picker-panel">${rows}</div>`
    : '';

  const liveBadge = isLive
    ? `<span style="font-size:10px;font-weight:700;letter-spacing:0.08em;background:rgba(255,255,255,0.25);color:${c.fg};padding:2px 8px;border-radius:999px;flex-shrink:0;">LIVE</span>`
    : '';

  const backToLive = manualMode
    ? `<button class="back-to-live" onclick="goLive()">↩ Back to live</button>`
    : '';

  return `<div style="padding:0 24px 16px;">
    <div class="mode-picker-wrap">
      <button class="mode-badge-btn" style="background:${c.bg};" onclick="toggleModePicker(event)" aria-expanded="${pickerOpen}" aria-haspopup="listbox">
        <div class="mode-dot" style="background:rgba(255,255,255,0.6)"></div>
        <span class="mode-label" style="color:${c.fg}">${c.label}</span>
        ${liveBadge}
        ${chevron}
      </button>
      ${panel}
    </div>
    ${backToLive}
    <div class="mode-headline">${c.headline}</div>
  </div>`;
}

function toggleModePicker(e) {
  e.stopPropagation();

function selectMode(key) {
  manualMode = key === getMode() ? null : key;

function goLive() {

function getEnergyStyle(label) {
  const l = (label || '').toLowerCase();
  if (/peak|flow/.test(l))                          return _emodes.peak;
  if (/deep\s*work/.test(l))                        return _emodes.deep;
  if (/rebuild/.test(l))                            return _emodes.rebuild;
  if (/execut/.test(l))                             return _emodes.execute;
  if (/presence/.test(l))                           return _emodes.presence;
  if (/prim|manifest|spiritual|wrap/.test(l))       return _emodes.prime;
  return null;
}

}

      <button class="connect-btn" id="connect-btn">Connect Second Brain</button>
      <div class="connect-note">One-time permission · Your data never leaves your device</div>
    </div>`;
  document.getElementById('connect-btn').addEventListener('click', connectAndLoad);
}

async function connectAndLoad() {
  if (!hasFileAccess) {
    alert('File access is not supported in this browser. Open on desktop Chrome or Edge to connect your Second Brain.');
    return;
  }
  try {
    const dir = await window.showDirectoryPicker({ mode: 'read' });
    await saveHandle(dir);
    await loadAndRender(dir);
  } catch (e) {
    if (e.name !== 'AbortError') alert('Could not connect. Make sure you select your AI Second Brain folder.');
  }
}

/* ---- ROUTING ---- */
let activeTab = 'home';
let countdownTimer = null;

function render(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-pill').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  clearInterval(countdownTimer);
  let html='';
  if (tab==='home') {
    const mode = manualMode || getMode();
    if (mode==='prime')        html=renderPrime();
    else if (mode==='peak')  { html=renderPeak(); countdownTimer=setInterval(()=>{const el=document.getElementById('countdown');if(el)el.textContent=getPeakTime();else clearInterval(countdownTimer);},1000); }
    else if (mode==='rebuild') html=renderRebuild();
    else if (mode==='execute') html=renderExecute();
    else                       html=renderWrap();
  } else if (tab==='day')      html=renderDay();
  else if (tab==='people')     html=renderPeople();
  else if (tab==='projects')   html=renderProjects();
  const content=document.getElementById('content');
  content.innerHTML=html;
  content.scrollTop=0;
  updateLiveChip();
}

document.getElementById('tab-bar').addEventListener('click', e=>{
  const p=e.target.closest('.tab-pill');
  if(p) render(p.dataset.tab);
});

document.addEventListener('click', e => {
  if (pickerOpen && !e.target.closest('.mode-picker-wrap')) {
    pickerOpen = false;
    render(activeTab);
  }
});

/* ---- DATE NAVIGATION ---- */
let currentDate = new Date();
let activeRootDir = null;

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date();
  return d.toDateString() === t.toDateString();
}
function updateDateNav() {
  const lbl = document.getElementById('day-label');
  const nxt = document.getElementById('next-day');
  const today = isToday(currentDate);
  lbl.textContent = today
    ? 'Today · ' + currentDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})
    : currentDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  lbl.className = 'day-label' + (today ? '' : ' past');
  nxt.disabled = today;
}

async function fetchProjects() {
  try {
    const r = await fetch('/projects');
    if (!r.ok) return;
    const names = (await r.text()).split('\n').filter(Boolean);
    const projects = [];
    for (const name of names.slice(0, 10)) {
      const proj = { name, sub:'', status:'active', pri:'M', next:'—', blocked:false };
      try {
        const sr = await fetch(`/projects/${encodeURIComponent(name)}/Status.md`);
        if (sr.ok) {
          const txt = await sr.text();
          const statusM = txt.match(/\*\*Status[^:]*:\*\*\s*([^\n]+)/i);
          const nextM   = txt.match(/\*\*Next[^:]*:\*\*\s*([^\n]+)/i);
          const priM    = txt.match(/\*\*Priority[^:]*:\*\*\s*([HML])/i);
          const subM    = txt.match(/^>\s*(.{10,60})$/m) || txt.match(/^[A-Z][^#\n].{10,60}$/m);
          if (statusM) { const s=statusM[1].toLowerCase(); proj.status=s.includes('block')?'blocked':s.includes('slow')?'slow':'active'; proj.blocked=proj.status==='blocked'; }
          if (nextM)   proj.next = nextM[1].trim().substring(0,80);
          if (priM)    proj.pri  = priM[1].toUpperCase();
          if (subM)    proj.sub  = subM[1].trim().substring(0,45);
        }
      } catch {}
      projects.push(proj);
    }
    if (projects.length) data.projects = projects;
  } catch {}
}

async function fetchFromGitHub(dateStr) {
  const banner = document.getElementById('no-plan-banner');
  try {
    const r = await fetch(`daily/${dateStr}.md`);
    if (r.ok) {
      const txt = await r.text();
      const parsed = parseDailyNote(txt);
      if (parsed.faithAnchor) data.faithAnchor = parsed.faithAnchor;
      if (parsed.schedule)    data.schedule    = parsed.schedule;
      if (parsed.tenX)        data.tenX        = parsed.tenX;
      if (parsed.log)         data.log         = parsed.log;
      if (parsed.contacts)    data.contacts    = parsed.contacts;
      if (parsed.outreach)    data.outreach    = parsed.outreach;
      if (parsed.maskJournal) data.maskJournal = parsed.maskJournal;
      if (parsed.quickHits)   data.quickHits   = parsed.quickHits;
      banner.style.display = 'none';
    } else if (r.status === 404 && isToday(currentDate)) {
      banner.style.display = 'block';
    }
  } catch {}
  try {
    const r = await fetch('/api/contacts');
    if (r.ok) {
      const payload = await r.json();
      const contacts = Array.isArray(payload) ? payload : (payload.contacts || []);
      const batchQueue = Array.isArray(payload) ? null : (payload.batchQueue || null);
      if (contacts.length) {
        data.contacts = contacts;
        data.outreach = contacts.filter(c => c.status === 'overdue' || c.status === 'send').map(c => ({...c, msg:''}));
      }
      data.batchQueue = batchQueue;
    }
  } catch {}
  if (isLocalServer) await fetchProjects();
}

async function navigateDay(delta) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + delta);
  if (d > new Date()) return;
  currentDate = d;
  data = JSON.parse(JSON.stringify(sample));
  document.getElementById('no-plan-banner').style.display = 'none';
  updateDateNav();
  const dateStr = formatDate(currentDate);
  if (activeRootDir && !isLocalServer) {
    await loadRealData(activeRootDir, dateStr);
  } else {
    await fetchFromGitHub(dateStr);
  }
  render(activeTab === 'home' ? 'home' : activeTab);
}

document.getElementById('prev-day').addEventListener('click', () => navigateDay(-1));
document.getElementById('next-day').addEventListener('click', () => navigateDay(+1));

function showAppShell() {
  document.getElementById('tab-bar').style.display = 'flex';
  document.getElementById('mic-bar').style.display  = 'block';
  document.getElementById('date-nav').style.display = 'flex';
  updateDateNav();
}

async function loadAndRender(dir) {
  activeRootDir = dir;
  const dateStr = formatDate(currentDate);
  await loadRealData(dir, dateStr);
  showAppShell();
  const note = document.getElementById('connected-note');
  note.style.display = 'block';
  note.textContent = `Connected · ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}`;
  render('home');
}

/* ---- NARRATION ---- */
const micInput=document.getElementById('mic-input'),micBtn=document.getElementById('mic-btn');
let SR=null,listening=false;
const speechSupported=('webkitSpeechRecognition' in window||'SpeechRecognition' in window) && (location.protocol==='https:'||location.hostname==='localhost');
if(speechSupported){
  const C=window.SpeechRecognition||window.webkitSpeechRecognition;
  SR=new C();
  SR.continuous=true;
  SR.interimResults=true;
  SR.lang='en-US';
  SR.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        const t=e.results[i][0].transcript.trim();
        if(t){micInput.value='';micInput.classList.remove('interim');submitLogEntry(t);}
      } else {
        interim+=e.results[i][0].transcript;
      }
    }
    if(interim){micInput.value=interim;micInput.classList.add('interim');}
  };
  SR.onend=()=>{
    micInput.classList.remove('interim');
    if(listening){try{SR.start();}catch(err){listening=false;micBtn.classList.remove('listening');}}
  };
  SR.onerror=e=>{
    if(e.error==='no-speech')return;
    listening=false;micBtn.classList.remove('listening');micInput.classList.remove('interim');
  };
} else {
  micBtn.title='Voice requires HTTPS — type your note and press Enter';
  micBtn.style.opacity='0.4';
}
micBtn.addEventListener('click',()=>{
  if(!SR){micInput.focus();return;}
  if(!listening){
    listening=true;micBtn.classList.add('listening');
    try{SR.start();}catch(e){listening=false;micBtn.classList.remove('listening');}
  } else {
    listening=false;micBtn.classList.remove('listening');micInput.classList.remove('interim');
    try{SR.stop();}catch(e){}
    if(micInput.value.trim()){submitLogEntry(micInput.value.trim());micInput.value='';}
  }
});
micInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&micInput.value.trim()){const t=micInput.value.trim();micInput.value='';micInput.classList.remove('interim');submitLogEntry(t);}});
async function submitLogEntry(text){
  if(!text)return;
  const now=new Date();
  const timeStr=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  data.log.push({time:timeStr,entry:text});
  const ll=document.getElementById('last-logged');
  if(ll){ll.textContent=`✓ ${timeStr} — ${text}`;ll.style.display='block';}
  if(activeTab==='home'||activeTab==='day')render(activeTab);
  if(isLocalServer && isToday(currentDate)){
    try{
      await fetch('/daily/log',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({date:formatDate(currentDate),time:timeStr,entry:text})
      });
    }catch{}
  }
}

/* ---- MASK EDIT ---- */
function openMaskEdit(letter) {
  const m = data.maskJournal && data.maskJournal.find(x => x.letter === letter);
  if (!m) return;
  const card = document.getElementById('mask-card-' + letter);
  if (!card || card.dataset.editing) return;
  card.dataset.editing = '1';
  card.classList.remove('tappable');
  card.removeAttribute('onclick');
  card.style.cursor = 'default';
  card.innerHTML = `
    <div class="mask-journal-letter">${m.letter}</div>
    <div style="flex:1;min-width:0;">
      <div class="mask-journal-label" style="margin-bottom:3px;">${esc(m.label)}</div>
      <div class="mask-journal-prompt">${esc(m.prompt)}</div>
      <textarea class="mask-journal-textarea" id="mask-ta-${letter}" placeholder="Write your response...">${esc(m.response||'')}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="mask-save-btn" onclick="saveMaskEdit('${letter}')">Save</button>
        <button class="mask-cancel-btn" onclick="cancelMaskEdit('${letter}')">Cancel</button>
      </div>
    </div>`;
  const ta = document.getElementById('mask-ta-' + letter);
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight + 4) + 'px';
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight + 4) + 'px'; });
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;
}

function cancelMaskEdit(letter) {
  render('day');
  setTimeout(() => {
    const card = document.getElementById('mask-card-' + letter);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

async function saveMaskEdit(letter) {
  const ta = document.getElementById('mask-ta-' + letter);
  if (!ta) return;
  const response = ta.value.trim();
  if (!response) { ta.focus(); return; }

  const m = data.maskJournal && data.maskJournal.find(x => x.letter === letter);
  if (m) m.response = response;

  if (isLocalServer) {
    try {
      await fetch('/daily/mask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: formatDate(currentDate), letter, response })
      });
    } catch {}
  }

  render('day');
  // Scroll the saved card into view
  setTimeout(() => {
    const card = document.getElementById('mask-card-' + letter);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

/* ---- 10X TOGGLE ---- */
async function toggleTenX(i) {
  if (!data.tenX || !data.tenX[i]) return;
  data.tenX[i].done = !data.tenX[i].done;
  data.tenX.forEach(t => t.pri = false);
  const first = data.tenX.find(t => !t.done);
  if (first) first.pri = true;
  if (navigator.vibrate) navigator.vibrate(8);
  render(activeTab);
  if (isLocalServer && isToday(currentDate)) {
    try {
      await fetch('/daily/tenx', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: formatDate(currentDate), index: i, done: data.tenX[i].done})
      });
    } catch {}
  }
}

/* ---- CONTACT DETAIL ---- */
function showContactDetail(c) {
  const body = document.getElementById('contact-sheet-body');
  const sheet = document.getElementById('contact-sheet');
  const overlay = document.getElementById('contact-sheet-overlay');
  if (!body || !sheet) return;
  const statusColors = { overdue: 'var(--red-text)', send: 'var(--mint-text)', active: 'var(--text-3)' };
  const statusLabels = { overdue: 'Overdue', send: 'Priority', active: 'Active' };
  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <div class="contact-avatar ${c.av}" style="width:48px;height:48px;font-size:16px;flex-shrink:0;">${c.initials}</div>
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:700;color:var(--text);line-height:1.2;">${c.name}</div>
        ${c.role ? `<div style="font-size:13px;color:var(--text-3);margin-top:2px;">${c.role}</div>` : ''}
      </div>
      <span style="font-size:12px;font-weight:600;color:${statusColors[c.status]||'var(--text-3)'};">${statusLabels[c.status]||''}</span>
    </div>
    ${c.lastTouch ? `<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-4);margin-bottom:4px;">Last Touch</div><div style="font-size:14px;color:var(--text-2);line-height:1.5;">${c.lastTouch}</div></div>` : ''}
    ${c.action ? `<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-4);margin-bottom:4px;">Next Action</div><div style="font-size:14px;color:var(--text);line-height:1.5;">${c.action}</div></div>` : ''}
    ${c.time ? `<div style="margin-bottom:14px;"><div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-4);margin-bottom:4px;">Due</div><div style="font-size:14px;color:${c.status==='overdue'?'var(--red-text)':'var(--text-2)'};">${c.time}</div></div>` : ''}
    ${c.notes ? `<div style="margin-bottom:4px;"><div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-4);margin-bottom:4px;">Notes</div><div style="font-size:13px;color:var(--text-3);line-height:1.6;">${c.notes}</div></div>` : ''}
  `;
  overlay.style.display = 'block';
  requestAnimationFrame(() => { sheet.style.transform = 'translateY(0)'; });
}
function closeContactDetail() {
  const sheet = document.getElementById('contact-sheet');
  const overlay = document.getElementById('contact-sheet-overlay');
  if (sheet) sheet.style.transform = 'translateY(100%)';
  if (overlay) overlay.style.display = 'none';
}
(function initSheetSwipe() {
  const sheet = document.getElementById('contact-sheet');
  if (!sheet) return;
  let startY = 0;
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60) closeContactDetail();
  }, { passive: true });
})();

/* ---- REFRESH ---- */
let lastFetchTime = 0;

function timeSince(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 90) return 'just now';
  const m = Math.floor(s / 60);
  return m === 1 ? '1 min ago' : `${m} min ago`;
}

function updateConnectedNote() {
  const el = document.getElementById('connected-note');
  if (!el || !lastFetchTime || el.style.display === 'none') return;
  el.textContent = `Live · ${timeSince(lastFetchTime)} · r4`;
}

let isRefreshing = false;
async function doRefresh() {
  if (isRefreshing || document.hidden) return;
  isRefreshing = true;
  const ptr = document.getElementById('ptr-indicator');
  if (ptr) { ptr.style.opacity = '1'; ptr.querySelector('svg').classList.add('spinning'); }
  try {
    const r = await fetch(`/daily/${formatDate(currentDate)}.md?_t=${Date.now()}`);
    if (r.ok) {
      const txt = await r.text();
      const parsed = parseDailyNote(txt);
      if (parsed.tenX)        data.tenX        = parsed.tenX;
      if (parsed.log)         data.log         = parsed.log;
      if (parsed.quickHits)   data.quickHits   = parsed.quickHits;
      if (parsed.maskJournal) data.maskJournal = parsed.maskJournal;
      lastFetchTime = Date.now();
      updateConnectedNote();
      if (!document.querySelector('[data-editing]') && document.activeElement !== document.getElementById('mic-input')) {
        render(activeTab);
      }
    }
  } catch {}
  if (ptr) { ptr.style.opacity = '0'; ptr.querySelector('svg').classList.remove('spinning'); }
  isRefreshing = false;
}

function initPullToRefresh() {
  const el = document.getElementById('content');
  if (!el) return;
  let startY = 0, pulling = false;
  const ptr = document.getElementById('ptr-indicator');
  el.addEventListener('touchstart', e => {
    if (el.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 10 && ptr) ptr.style.opacity = Math.min(dy / 80, 1).toFixed(2);
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (ptr) ptr.style.opacity = '0';
    if (dy > 64) doRefresh();
  }, { passive: true });
}

function startPolling() {
  setInterval(updateConnectedNote, 30_000);
}

/* ---- INIT ---- */
const hasFileAccess = typeof window.showDirectoryPicker === 'function';
const isLocalServer = ['localhost','127.0.0.1'].includes(location.hostname)
  || location.hostname.endsWith('.local')
  || /^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(location.hostname);

async function init() {
  if (isLocalServer) {
    showAppShell();
    document.getElementById('connected-note').style.display = 'block';
    await fetchFromGitHub(formatDate(currentDate));
    lastFetchTime = Date.now();
    updateConnectedNote();
    startPolling();
    initPullToRefresh();
    render('home');
    return;
  }
  if (!hasFileAccess) {
    // iOS Safari on GitHub Pages — fetch synced markdown files
    showAppShell();
    await fetchFromGitHub(formatDate(currentDate));
    render('home');
    return;
  }
  try {
    const stored = await loadHandle();
    if (stored) {
      let perm = await stored.queryPermission({ mode: 'read' });
      if (perm !== 'granted') perm = await stored.requestPermission({ mode: 'read' });
      if (perm === 'granted') { await loadAndRender(stored); return; }
    }
  } catch {}
  showConnectScreen();
}
init();
</script>
